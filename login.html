<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Selene - 登录注册</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: { primary: { 50:'#EFF6FF',100:'#DBEAFE',200:'#BFDBFE',300:'#93C5FD',400:'#60A5FA',500:'#3B82F6',600:'#2563EB',700:'#1D4ED8',800:'#1E40AF',900:'#1E3A8A' }, accent: { 400:'#FBBF24',500:'#F59E0B',600:'#D97706' } }, fontFamily: { sans: ['Noto Sans SC','PingFang SC','Microsoft YaHei','sans-serif'] } } } };
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { font-family: 'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif; box-sizing: border-box; }
:root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
html, body { width: 100%; min-height: 100%; }
body { margin:0; min-height: 100dvh; background: linear-gradient(120deg,#E0F2FE 0%,#EEF2FF 48%,#FEF3C7 100%); color:#1E293B; display:flex; align-items:center; justify-content:center; padding:24px; overflow-x:hidden; }
.glass-panel { background: rgba(255,255,255,.76); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border:1px solid rgba(255,255,255,.85); box-shadow:0 20px 60px rgba(30,58,138,.10); }
.hero-image { background-image: url('login_hero.png'); background-size: cover; background-position: center; }
.logo-img { width:100%; height:100%; object-fit:cover; border-radius:18px; }
.form-view { display:none; animation: fadeIn .24s ease-out; }
.form-view.active { display:block; }
@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
input { font-size: 16px; }
@media (max-width: 768px) {
  body { align-items:stretch; padding: calc(10px + var(--safe-top)) 10px calc(10px + var(--safe-bottom)); }
  .auth-shell { min-height: calc(100dvh - 20px - var(--safe-top) - var(--safe-bottom)); border-radius:28px !important; grid-template-columns:1fr !important; }
  .auth-hero { display:none; }
  .auth-form { padding: 26px 18px !important; }
}
</style>
</head>
<body>
<div class="auth-shell glass-panel w-full max-w-5xl min-h-[620px] rounded-[2rem] overflow-hidden grid grid-cols-[1.05fr_.95fr]">
  <section class="auth-hero hero-image relative p-10 flex flex-col justify-between">
    <div class="absolute inset-0 bg-slate-900/20"></div>
    <div class="relative flex items-center gap-3 text-white">
      <div class="w-12 h-12 rounded-2xl bg-slate-900/70 overflow-hidden"><img src="selene_logo.png" alt="Selene" class="logo-img"></div>
      <div><h1 class="text-2xl font-extrabold">Selene</h1><p class="text-white/75 text-sm font-medium">留学生智能陪伴平台</p></div>
    </div>
    <div class="relative text-white max-w-sm">
      <p class="text-sm font-semibold text-white/80 mb-3">From arrival to career</p>
      <h2 class="text-4xl font-extrabold leading-tight">来中国，学中国，融入中国，留在中国</h2>
    </div>
  </section>
  <section class="auth-form p-10 flex flex-col justify-center">
    <div class="lg:hidden text-center mb-8">
      <div class="mx-auto w-16 h-16 rounded-3xl bg-slate-800 overflow-hidden mb-4"><img src="selene_logo.png" alt="Selene" class="logo-img"></div>
      <h1 class="text-2xl font-extrabold text-slate-800">Selene</h1>
      <p class="text-slate-500 text-sm font-medium mt-1">留学生智能陪伴平台</p>
    </div>
    <div class="grid grid-cols-2 bg-slate-100/80 rounded-2xl p-1 mb-8">
      <button id="loginTab" onclick="switchTab('login')" class="rounded-xl py-3 font-bold bg-white shadow-sm text-slate-800">登录</button>
      <button id="registerTab" onclick="switchTab('register')" class="rounded-xl py-3 font-bold text-slate-500">注册</button>
    </div>
    <form id="loginForm" class="form-view active space-y-5" onsubmit="event.preventDefault(); location.href='chinese.html';">
      <div><label class="block text-sm font-bold text-slate-700 mb-2">邮箱</label><input type="email" placeholder="请输入邮箱" class="w-full px-4 py-4 rounded-2xl bg-white/80 border border-slate-200 outline-none focus:border-blue-400"></div>
      <div><label class="block text-sm font-bold text-slate-700 mb-2">密码</label><input type="password" placeholder="请输入密码" class="w-full px-4 py-4 rounded-2xl bg-white/80 border border-slate-200 outline-none focus:border-blue-400"></div>
      <button class="w-full py-4 rounded-2xl bg-slate-800 hover:bg-blue-600 text-white font-extrabold transition-all shadow-lg">进入平台</button>
    </form>
    <form id="registerForm" class="form-view space-y-5" onsubmit="event.preventDefault(); location.href='chinese.html';">
      <div><label class="block text-sm font-bold text-slate-700 mb-2">昵称</label><input type="text" placeholder="请输入昵称" class="w-full px-4 py-4 rounded-2xl bg-white/80 border border-slate-200 outline-none focus:border-blue-400"></div>
      <div><label class="block text-sm font-bold text-slate-700 mb-2">邮箱</label><input type="email" placeholder="请输入邮箱" class="w-full px-4 py-4 rounded-2xl bg-white/80 border border-slate-200 outline-none focus:border-blue-400"></div>
      <div><label class="block text-sm font-bold text-slate-700 mb-2">密码</label><input type="password" placeholder="请设置密码" class="w-full px-4 py-4 rounded-2xl bg-white/80 border border-slate-200 outline-none focus:border-blue-400"></div>
      <button class="w-full py-4 rounded-2xl bg-slate-800 hover:bg-blue-600 text-white font-extrabold transition-all shadow-lg">创建账号</button>
    </form>
  </section>
</div>
<script>
function switchTab(tab){
  const loginTab=document.getElementById('loginTab'), registerTab=document.getElementById('registerTab');
  const loginForm=document.getElementById('loginForm'), registerForm=document.getElementById('registerForm');
  const active='bg-white shadow-sm text-slate-800', normal='text-slate-500';
  if(tab==='login'){
    loginForm.classList.add('active'); registerForm.classList.remove('active');
    loginTab.className='rounded-xl py-3 font-bold '+active; registerTab.className='rounded-xl py-3 font-bold '+normal;
  }else{
    registerForm.classList.add('active'); loginForm.classList.remove('active');
    registerTab.className='rounded-xl py-3 font-bold '+active; loginTab.className='rounded-xl py-3 font-bold '+normal;
  }
}
</script>
</body>
</html>
