<style>
* { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; box-sizing: border-box; }
body { background: linear-gradient(to right, #E0F2FE 0%, #FEF3C7 100%); background-attachment: fixed; color: #1E293B; overflow: hidden; }
.glass { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 8px 32px rgba(30, 58, 138, 0.05); }
.nav-item { transition: all 0.3s; }
.nav-item:hover { background: rgba(255, 255, 255, 0.7); transform: translateX(8px); }
.nav-item.active { background: #FFFFFF; box-shadow: 0 4px 12px rgba(30, 58, 138, 0.05); border-color: rgba(59, 130, 246, 0.2); transform: none; }
.custom-scrollbar::-webkit-scrollbar { width: 6px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.5); }
.search-container:focus-within { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); border-color: #93C5FD; }
.tag-btn { transition: all 0.25s ease; white-space: nowrap; }
.tag-btn:hover { transform: translateY(-1px); }

/* 小红书风格双栏瀑布流 */
.xhs-feed { column-count: 2; column-gap: 18px; }
.xhs-post { width: 100%; display: inline-block; break-inside: avoid; -webkit-column-break-inside: avoid; margin: 0 0 18px; overflow: hidden; cursor: pointer; padding: 0 !important; vertical-align: top; transition: transform .25s ease, box-shadow .25s ease; }
.xhs-post:hover { transform: translateY(-6px); box-shadow: 0 18px 42px rgba(30, 58, 138, .11); }
.xhs-cover { min-height: 138px; padding: 18px; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,.75); position: relative; overflow: hidden; }
.xhs-post:nth-child(2n) .xhs-cover { min-height: 178px; }
.xhs-post:nth-child(3n) .xhs-cover { min-height: 152px; }
.xhs-post:nth-child(5n) .xhs-cover { min-height: 198px; }
.xhs-cover::after { content: ''; position: absolute; width: 130px; height: 130px; right: -42px; bottom: -48px; background: rgba(255,255,255,.42); border-radius: 999px; }
.xhs-icon { width: 58px; height: 58px; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 18px rgba(30,58,138,.06); z-index: 1; }
.xhs-content { padding: 15px 15px 14px; }
.xhs-title { font-size: 1rem; line-height: 1.35; font-weight: 800; color: #1E293B; margin-bottom: 7px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.xhs-desc { font-size: .82rem; color: #64748B; line-height: 1.55; font-weight: 600; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.xhs-meta { padding-top: 12px; border-top: 1px solid rgba(226,232,240,.65); display:flex; align-items:center; justify-content:space-between; gap: 10px; }
.xhs-author { min-width: 0; display:flex; align-items:center; gap:7px; }
.xhs-author span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bookmark-btn { flex-shrink: 0; }
.mobile-nav-toggle, .mobile-nav-backdrop { display: none; }

/* 小红书详情页/弹层 */
.detail-layer { position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, .34); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: none; padding: 28px; }
.detail-layer.open { display: block; }
.detail-shell { max-width: 980px; height: calc(100dvh - 56px); margin: 0 auto; display: grid; grid-template-columns: minmax(0, .92fr) minmax(0, 1.08fr); overflow: hidden; border-radius: 32px; }
.detail-visual { position: relative; padding: 28px; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; }
.detail-visual-icon { width: 96px; height: 96px; border-radius: 30px; display:flex; align-items:center; justify-content:center; box-shadow: 0 18px 44px rgba(30,58,138,.12); }
.detail-content { background: rgba(255,255,255,.86); overflow-y: auto; padding: 26px 28px calc(28px + env(safe-area-inset-bottom)); }
.detail-close { position: absolute; top: 18px; left: 18px; width: 42px; height: 42px; border-radius: 16px; background: rgba(255,255,255,.86); display:flex; align-items:center; justify-content:center; color:#334155; box-shadow:0 8px 22px rgba(30,58,138,.08); z-index: 2; }
.detail-section { background: rgba(255,255,255,.65); border: 1px solid rgba(226,232,240,.78); border-radius: 22px; padding: 16px; margin-top: 14px; }
.detail-section h4 { color:#1E293B; font-weight: 800; margin-bottom: 10px; display:flex; align-items:center; gap:8px; }
.detail-section li { margin: 8px 0; color:#475569; line-height:1.75; font-weight: 600; font-size:.93rem; }
.detail-note { border-left: 4px solid #3B82F6; }
.no-results { display:none; }
.no-results.show { display:block; }

@media (min-width: 1100px) { .xhs-feed { column-count: 3; } }
@media (min-width: 1440px) { .xhs-feed { column-count: 4; } }

@media (max-width: 768px) {
  html, body { width: 100%; min-height: 100dvh; }
  body { overflow: hidden; -webkit-text-size-adjust: 100%; }
  .mobile-nav-toggle { display: flex; position: fixed; top: calc(12px + env(safe-area-inset-top)); left: 14px; z-index: 80; width: 44px; height: 44px; align-items: center; justify-content: center; border-radius: 16px; background: rgba(255, 255, 255, 0.78); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 8px 24px rgba(30, 58, 138, 0.12); color: #1E293B; }
  .mobile-nav-backdrop { display: block; position: fixed; inset: 0; z-index: 55; background: rgba(15, 23, 42, 0.28); opacity: 0; pointer-events: none; transition: opacity 0.28s ease; }
  body.mobile-nav-open .mobile-nav-backdrop { opacity: 1; pointer-events: auto; }
  body > aside.glass { width: min(82vw, 320px) !important; height: 100dvh !important; transform: translateX(-105%); transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1); z-index: 70; padding-top: env(safe-area-inset-top); border-radius: 0 28px 28px 0; }
  body.mobile-nav-open > aside.glass { transform: translateX(0); }
  body > aside.glass .nav-item:hover { transform: none; }
  body > aside.glass nav { overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
  body > main { margin-left: 0 !important; width: 100% !important; min-width: 0 !important; height: 100dvh !important; padding: calc(72px + env(safe-area-inset-top)) 12px calc(14px + env(safe-area-inset-bottom)) !important; overflow-x: hidden !important; }
  main header { gap: 12px; margin-bottom: 18px !important; }
  main header h2 { font-size: 1.55rem !important; line-height: 1.2 !important; }
  main header p { font-size: 0.9rem !important; }
  input, textarea, select, button { font-size: 16px; }
  #tagContainer { overflow-x: auto; flex-wrap: nowrap !important; padding-bottom: 4px; margin-bottom: 16px !important; -webkit-overflow-scrolling: touch; }
  #tagContainer::-webkit-scrollbar { display:none; }
  .tag-btn { padding: 9px 14px !important; font-size: .78rem !important; }
  .xhs-feed { column-count: 2; column-gap: 10px; }
  .xhs-post { margin-bottom: 10px; border-radius: 22px !important; }
  .xhs-post:hover { transform: none; }
  .xhs-cover { min-height: 104px; padding: 12px; }
  .xhs-post:nth-child(2n) .xhs-cover { min-height: 136px; }
  .xhs-post:nth-child(3n) .xhs-cover { min-height: 116px; }
  .xhs-post:nth-child(5n) .xhs-cover { min-height: 152px; }
  .xhs-icon { width: 42px; height: 42px; border-radius: 15px; }
  .xhs-icon i { font-size: 1.18rem !important; }
  .xhs-content { padding: 11px; }
  .xhs-title { font-size: .9rem; margin-bottom: 6px; }
  .xhs-desc { font-size: .72rem; line-height: 1.45; -webkit-line-clamp: 3; margin-bottom: 10px; }
  .xhs-meta { padding-top: 9px; gap: 6px; }
  .xhs-author span, .xhs-meta .read-time { font-size: .68rem !important; }
  .xhs-author .avatar { width: 22px !important; height: 22px !important; }
  .bookmark-btn { font-size: .82rem; }

  .detail-layer { padding: 0; background: rgba(255,255,255,.08); }
  .detail-shell { width: 100%; height: 100dvh; border-radius: 0; display: flex; flex-direction: column; }
  .detail-visual { min-height: 240px; padding: calc(62px + env(safe-area-inset-top)) 22px 20px; flex: 0 0 auto; }
  .detail-visual-icon { width: 76px; height: 76px; border-radius: 25px; }
  .detail-content { flex: 1; border-radius: 28px 28px 0 0; margin-top: -22px; padding: 22px 18px calc(26px + env(safe-area-inset-bottom)); }
  .detail-close { top: calc(14px + env(safe-area-inset-top)); left: 16px; }
  .detail-content h2 { font-size: 1.35rem !important; line-height: 1.35 !important; }
  .detail-section { padding: 14px; border-radius: 20px; }
  .detail-section li { font-size: .88rem; }
}

@media (max-width: 430px) { body > aside.glass { width: 84vw !important; } }

let currentDetailId = null;

function cardHtml(post) {
  const c = colorMap[post.color];
  return `<article class="xhs-post glass rounded-3xl" data-id="${post.id}" data-tag="${post.tag}" onclick="openDetail('${post.id}')">
    <div class="xhs-cover ${c.cover}">
      <div class="xhs-icon ${c.iconBg} ${c.text}"><i class="${post.icon} text-3xl"></i></div>
      <span class="px-2.5 py-1 rounded-lg bg-white/70 ${c.tagText} font-bold text-xs border border-white/80">${post.category}</span>
    </div>
    <div class="xhs-content">
      <div class="flex items-center gap-2 mb-2"><span class="text-slate-400 font-bold text-xs read-time">${post.read}</span><span class="text-slate-300 text-xs">·</span><span class="text-slate-400 font-bold text-xs"><i class="far fa-heart mr-1"></i>${post.likes}</span></div>
      <h3 class="xhs-title">${post.title}</h3>
      <p class="xhs-desc">${post.desc}</p>
      <div class="xhs-meta">
        <div class="xhs-author"><div class="avatar w-7 h-7 rounded-full ${c.iconBg} flex items-center justify-center flex-shrink-0"><i class="fas fa-user ${c.text} text-xs"></i></div><span class="text-slate-500 font-bold text-xs">${post.author}</span></div>
        <button class="bookmark-btn text-slate-400 hover:text-blue-600 transition-colors" onclick="event.stopPropagation(); toggleBookmark(this)"><i class="far fa-bookmark"></i></button>
      </div>
    </div>
  </article>`;
}

function renderPosts(list = posts) {
  const container = document.getElementById('masonryContainer');
  container.innerHTML = list.map(cardHtml).join('');
  document.getElementById('noResults').classList.toggle('show', list.length === 0);
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = posts.filter(p => (activeTag === 'all' || p.tag === activeTag) && (!q || [p.title,p.desc,p.category,p.author].join(' ').toLowerCase().includes(q)));
  renderPosts(filtered);
}

function filterByTag(tag, btn) {
  activeTag = tag;
  document.querySelectorAll('#tagContainer .tag-btn').forEach(b => {
    b.className = 'tag-btn bg-white/70 border border-slate-200 text-slate-600 hover:bg-white hover:text-slate-800 px-5 py-2.5 rounded-xl text-sm font-medium shadow-sm';
  });
  btn.className = 'tag-btn bg-slate-800 text-white shadow-md px-5 py-2.5 rounded-xl text-sm font-bold';
  applyFilters();
}

function sectionHtml(sec) {
  return `<div class="detail-section"><h4><i class="fas fa-circle-check text-blue-500"></i>${sec.h}</h4><ul>${sec.items.map(item => `<li>${item}</li>`).join('')}</ul></div>`;
}

function openDetail(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  currentDetailId = id;
  const c = colorMap[post.color];
  document.getElementById('detailVisual').className = `detail-visual ${c.cover}`;
  document.getElementById('detailIconWrap').className = `detail-visual-icon ${c.iconBg} ${c.text}`;
  document.getElementById('detailIcon').className = `${post.icon} text-4xl`;
  document.getElementById('detailCategory').textContent = post.category;
  document.getElementById('detailReadTime').textContent = `${post.read} · ${post.likes} 人收藏`;
  document.getElementById('detailVisualTitle').textContent = post.title;
  document.getElementById('detailAuthorAvatar').className = `w-10 h-10 rounded-full ${c.iconBg} ${c.text} flex items-center justify-center flex-shrink-0`;
  document.getElementById('detailAuthor').textContent = post.author;
  document.getElementById('detailTitle').textContent = post.title;
  document.getElementById('detailLead').textContent = post.desc;
  document.getElementById('detailBody').innerHTML = (post.tip ? `<div class="detail-section detail-note"><h4><i class="fas fa-lightbulb text-amber-500"></i>先记住这个小提示</h4><p class="text-slate-600 font-semibold leading-relaxed">${post.tip}</p></div>` : '') + post.sections.map(sectionHtml).join('') + `<div class="detail-section"><h4><i class="fas fa-comment-dots text-emerald-500"></i>Selene 小提醒</h4><p class="text-slate-600 font-semibold leading-relaxed">刚到上海不用一次性把所有规则都掌握。可以先收藏这篇指南，遇到真实场景时再打开对照操作；如果不确定怎么表达，优先使用礼貌询问式句子。</p></div>`;
  document.getElementById('detailTopics').innerHTML = [`#${post.category}`, '#上海生活', '#留学生友好'].map(t => `<span class="xhs-topic-chip"><i class="fas fa-hashtag"></i>${t.replace('#','')}</span>`).join('');
  document.getElementById('detailHeartCount').textContent = post.likes;
  const heartIcon = document.querySelector('.xhs-detail-actions .xhs-action-btn i');
  if (heartIcon) heartIcon.className = 'far fa-heart';
  renderComments(id);
  const layer = document.getElementById('detailLayer');
  layer.classList.add('open');
  layer.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
  const content = layer.querySelector('.detail-content');
  resetDetailVisualState();
  bindDetailScrollBehavior();
  if (content) content.scrollTop = 0;
}

function closeDetail(event) {
  if (event && event.target !== document.getElementById('detailLayer')) return;
  const layer = document.getElementById('detailLayer');
  layer.classList.remove('open');
  layer.setAttribute('aria-hidden','true');
  document.body.style.overflow = '';
  resetDetailVisualState();
  currentDetailId = null;
}

function toggleLike(btn) {
  const icon = btn.querySelector('i');
  const span = btn.querySelector('span');
  const liked = icon.classList.contains('fas');
  icon.className = liked ? 'far fa-heart mr-1.5' : 'fas fa-heart mr-1.5';
  span.textContent = liked ? '收藏' : '已收藏';
}

function toggleBookmark(btn) {
  const icon = btn.querySelector('i');
  icon.className = icon.classList.contains('fas') ? 'far fa-bookmark' : 'fas fa-bookmark';
  showToast(icon.classList.contains('fas') ? '已收藏' : '已取消收藏');
}

function renderComments(id){
  const list=commentsByPost[id]||[];
  document.getElementById('commentsTotal').textContent=`${list.length} 条`;
  document.getElementById('detailCommentCount').textContent=`${list.length} 条`;

function addComment(){
  if(!currentDetailId)return;
  const input=document.getElementById('commentInput');
  const text=input.value.trim();
  if(!text){showToast('先输入评论内容哦');return;}
  if(!commentsByPost[currentDetailId]) commentsByPost[currentDetailId]=[];
  commentsByPost[currentDetailId].unshift({name:'我',text,time:'刚刚',likes:0});
  input.value='';
  renderComments(currentDetailId);
  showToast('评论已发布');
}
function handleCommentKey(event){ if(event.key==='Enter'){event.preventDefault();addComment();} }
function focusCommentInput(){const input=document.getElementById('commentInput'); if(input){input.scrollIntoView({block:'center',behavior:'smooth'}); setTimeout(()=>input.focus(),180);}}
function toggleDetailHeart(btn){const icon=btn.querySelector('i'); const liked=icon.classList.contains('fas'); icon.className=liked?'far fa-heart':'fas fa-heart'; showToast(liked?'已取消喜欢':'已喜欢');}


function bindDetailScrollBehavior(){
  const layer=document.getElementById('detailLayer');
  const shell=layer ? layer.querySelector('.detail-shell') : null;
  const content=layer ? layer.querySelector('.detail-content') : null;
  if(!shell || !content) return;
  if(content.dataset.scrollBound==='true') return;
  content.addEventListener('scroll',()=>{
    if(window.innerWidth<=768){
      shell.classList.toggle('visual-collapsed', content.scrollTop>48);
    }else{
      shell.classList.remove('visual-collapsed');
    }
  },{passive:true});
  content.dataset.scrollBound='true';
}
function resetDetailVisualState(){
  const shell=document.querySelector('#detailLayer .detail-shell');
  if(shell) shell.classList.remove('visual-collapsed');
}

    { id:'theatre', tag:'culture', category:'文化活动', color:'rose', icon:'fas fa-ticket', read:'7分钟阅读', title:'上海话剧观演指南', desc:'上海话剧艺术中心购票攻略与观演礼仪，第一次看中文话剧也不慌。', author:'Selene小编', likes:'840', sections:[{h:'购票建议', items:['提前看剧情简介，选择语言难度适中的剧。','第一次观演可以选择口碑稳定、剧情生活化的作品。','注意开演时间，迟到可能需要等到指定时间才能入场。']},{h:'观演礼仪', items:['演出中手机静音，不拍照录像。','看不懂的台词不用焦虑，可以关注演员表情和舞台调度。','结束后如果喜欢，可以和朋友聊聊最打动自己的片段。']}] }
  ];
  posts = posts.concat(newOnes.filter(n => !posts.some(p => p.id === n.id)));
  applyFilters();
  showToast('已加载更多内容');
}

function navigateTo(page) { window.location.href = page + '.html'; }
function handleLogout() { if (confirm('确定要退出登录吗？')) { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; } }
function showToast(message) { const toast = document.createElement('div'); toast.className = 'fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-xl z-[120] text-sm font-bold flex items-center space-x-2'; toast.innerHTML = `<i class="fas fa-info-circle text-blue-400"></i><span>${message}</span>`; document.body.appendChild(toast); setTimeout(() => { toast.style.transition = 'opacity .45s ease-out'; toast.style.opacity = '0'; setTimeout(() => toast.remove(), 450); }, 1400); }
function toggleMobileNav(force) { const shouldOpen = typeof force === 'boolean' ? force : !document.body.classList.contains('mobile-nav-open'); document.body.classList.toggle('mobile-nav-open', shouldOpen); const btn = document.querySelector('.mobile-nav-toggle'); if (btn) { btn.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false'); const icon = btn.querySelector('i'); if (icon) icon.className = shouldOpen ? 'fas fa-times' : 'fas fa-bars'; } }
document.addEventListener('keydown', e => { if (e.key === 'Escape') { if (document.getElementById('detailLayer').classList.contains('open')) closeDetail(); else toggleMobileNav(false); } });
document.querySelectorAll('body > aside.glass .nav-item').forEach(item => item.addEventListener('click', () => toggleMobileNav(false)));
window.addEventListener('resize', () => { if (window.innerWidth > 768) { toggleMobileNav(false); resetDetailVisualState(); } });
document.addEventListener('DOMContentLoaded', () => renderPosts(posts));
