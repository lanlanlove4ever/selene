    z-index: 70;

    border-radius: 0 28px 28px 0;
  }

  body.mobile-nav-open > aside.glass { transform: translateX(0); }

  body > aside.glass .nav-item:hover { transform: none; }
  body > aside.glass nav { overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

  body > main {

<script>
// 页面导航函数
function navigateTo(page) {
  window.location.href = page + '.html';
}

// 显示提示
function showToast(message) {
  const toast = document.createElement('div');
  toast.className = 'fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-2xl shadow-xl z-50 text-sm font-bold flex items-center space-x-2';
  toast.innerHTML = `<i class="fas fa-info-circle text-blue-400"></i><span>${message}</span>`;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.transition = 'opacity 0.5s ease-out';
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 500);
  }, 2000);
}

// 退出登录
function handleLogout() {
  if (confirm('确定要退出登录吗？')) {
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('userNickname');
    localStorage.removeItem('userEmail');
    localStorage.removeItem('userDuration');
    localStorage.removeItem('userEmotion');
    
    // 返回登录页
    window.location.href = 'login.html';
  }
}

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  /*
  if (!localStorage.getItem('isLoggedIn')) {
    window.location.href = 'login.html';
    return;
  }
  */
  
  // 加载用户信息
  const nickname = localStorage.getItem('userNickname');
  if (nickname) {
    document.getElementById('userNickname').textContent = nickname;
    document.getElementById('userGreeting').textContent = nickname;
  }
});
</script>
<script>

// Mobile navigation drawer: only affects narrow screens and keeps existing navigation logic intact.
function toggleMobileNav(force) {
  const shouldOpen = typeof force === 'boolean' ? force : !document.body.classList.contains('mobile-nav-open');
  document.body.classList.toggle('mobile-nav-open', shouldOpen);
  const btn = document.querySelector('.mobile-nav-toggle');
  if (btn) {
    btn.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    const icon = btn.querySelector('i');
    if (icon) icon.className = shouldOpen ? 'fas fa-times' : 'fas fa-bars';
  }
}

document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') toggleMobileNav(false);
});

document.querySelectorAll('body > aside.glass .nav-item').forEach(function(item) {
  item.addEventListener('click', function() { toggleMobileNav(false); });
});

window.addEventListener('resize', function() {
  if (window.innerWidth > 768) toggleMobileNav(false);
});

</script>
</body>
</html>
